name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "szymon.maciejewski.programista@gmail.com"
          git config user.name "szymonMCS"
          git checkout --orphan hf-deploy
          git add -A
          git commit -m "Deploy to HF Spaces"
          git push --force https://szymonMCS:$HF_TOKEN@huggingface.co/spaces/szymonMCS/rag_chatbot_neogadzet hf-deploy:main